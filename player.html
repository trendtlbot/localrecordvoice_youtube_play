<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- これら2つを追加 -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  
  <title>YouTube + ローカル音声 同時再生</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #f8f8f8; }
    .container { max-width: 1000px; margin: auto; }
    .controls { margin: 15px 0; }
    input, button { margin: 5px; padding: 8px; }
    .volume { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube + ローカル音声 同時再生</h1>

    <h2>1. YouTube動画</h2>
    <input type="text" id="youtubeUrl" placeholder="YouTube URL または 動画ID" style="width:70%;">
    <button onclick="loadYouTube()">読み込み</button>

    <!-- divはそのまま（YT.Playerがiframeを生成） -->
    <div id="youtubePlayer" style="margin: 15px 0;"></div>

    <h2>2. ローカル音声ファイル</h2>
    <input type="file" id="audioFile" accept="audio/*">
    <p>またはここに音声ファイルをドラッグ＆ドロップ</p>
    <audio id="localAudio" controls style="width:100%;"></audio>

    <div class="controls">
      <button onclick="playAll()">すべて再生</button>
      <button onclick="pauseAll()">すべて一時停止</button>
    </div>

    <div class="volume">
      <label>YouTube音量: </label>
      <input type="range" id="ytVolume" min="0" max="100" value="70" oninput="setYouTubeVolume(this.value)">
    </div>
    <div class="volume">
      <label>ローカル音声音量: </label>
      <input type="range" id="localVolume" min="0" max="100" value="80" oninput="setLocalVolume(this.value)">
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let youtubePlayer;
    const localAudio = document.getElementById('localAudio');

    function onYouTubeIframeAPIReady() {
      console.log("YouTube API Ready");
    }

    function loadYouTube() {
      let input = document.getElementById('youtubeUrl').value.trim();
      if (!input) return alert("URLまたは動画IDを入力してください");

      // 動画IDの抽出
      let videoId = input;
      const match = input.match(/(?:v=|youtu\.be\/|embed\/)([^?&"'>]+)/);
      if (match) videoId = match[1];

      if (youtubePlayer) youtubePlayer.destroy();

      youtubePlayer = new YT.Player('youtubePlayer', {
        height: '400',
        width: '100%',
        videoId: videoId,
        playerVars: {
          playsinline: 1,
          rel: 0,
          modestbranding: 1
        },
        events: {
          'onReady': (e) => {
            e.target.setVolume(70);
            console.log("YouTube Player Ready");
          },
          'onError': (e) => console.error("YouTube Error:", e.data)
        }
      });
    }

    function setYouTubeVolume(val) {
      if (youtubePlayer) youtubePlayer.setVolume(parseInt(val));
    }

    function setLocalVolume(val) {
      localAudio.volume = parseInt(val) / 100;
    }

    function playAll() {
      if (youtubePlayer) youtubePlayer.playVideo();
      localAudio.play().catch(() => {});
    }

    function pauseAll() {
      if (youtubePlayer) youtubePlayer.pauseVideo();
      localAudio.pause();
    }

    // ファイル選択・ドラッグ&ドロップ
    document.getElementById('audioFile').addEventListener('change', e => {
      if (e.target.files[0]) {
        localAudio.src = URL.createObjectURL(e.target.files[0]);
      }
    });

    document.body.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('audio/')) {
        localAudio.src = URL.createObjectURL(file);
      }
    });
    document.body.addEventListener('dragover', e => e.preventDefault());

    localAudio.volume = 0.8;
  </script>
</body>
</html>
